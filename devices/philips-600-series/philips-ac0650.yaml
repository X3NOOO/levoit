# MUJI/Philips AC0650/10 — replacement ESP32-C3 on the MCU↔module UART.
# The stock ESP32-C3-WROOM-02U has secure boot and can't be reflashed, so wire a
# replacement C3 to the MCU UART (hold the stock module's EN low to disable it).
# NOTE: verify the UART pins against your wiring (the MCU link, NOT the flash header).
substitutions:
  device_name: philips-ac0650
  wifi_ap_ssid: "Philips-AC0650"
  philips_model: AC0650
  rx_pin: GPIO20   # MCU TX → ESP RX
  tx_pin: GPIO21   # ESP TX → MCU RX

esphome:
  name: ${device_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

packages:
  common: !include common.yaml
