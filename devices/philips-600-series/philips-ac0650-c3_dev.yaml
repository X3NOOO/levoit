# C3 dev variant — replacement Seeed XIAO ESP32-C3 (a small board that fits in
# place of the stock module), local component + verbose logging.
# NOTE: verify the UART pins against your wiring.
substitutions:
  device_name: philips-ac0650-c3
  wifi_ap_ssid: "Philips-AC0650"
  philips_model: AC0650
  rx_pin: GPIO20   # XIAO C3 D7 — MCU TX → ESP RX
  tx_pin: GPIO21   # XIAO C3 D6 — ESP TX → MCU RX

esphome:
  name: ${device_name}

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

packages:
  common: !include common.yaml

logger:
  level: DEBUG   # VERBOSE shows the raw UART frames (TX -> / RX <-)
