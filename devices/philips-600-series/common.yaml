# Shared config for the MUJI/Philips AC0650/10 — included by the per-board yamls.
# Do not flash this directly.
logger:
  # On the ESP32-C3 the default logger UART (UART0) is GPIO20/21 — the same pins
  # as the MCU link. Log over the native USB instead so those pins stay free.
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${wifi_ap_ssid}"
    password: !secret wifi_ap_password

captive_portal:

external_components:
  - source:
      type: local
      path: ../../components
    components: [philips]

uart:
  - id: uart_mcu
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    baud_rate: 115200

philips:
  id: purifier
  model: ${philips_model}   # AC0650 (base) or AC0651 (PM2.5 + Auto Mode)

fan:
  - platform: philips
    philips: purifier
    name: "Fan"        # 3 speeds: 1=Sleep, 2=Medium, 3=Turbo

sensor:
  - platform: philips
    philips: purifier
    name: "Pre-filter"
    type: filter_clean
  - platform: philips
    philips: purifier
    name: "HEPA Filter"
    type: filter_lifetime

button:
  - platform: philips
    philips: purifier
    name: "Reset Pre-filter"
    type: reset_prefilter
  - platform: philips
    philips: purifier
    name: "Reset HEPA Filter"
    type: reset_hepa
